name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest tests/unit -v

  migration-and-integration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag -d rag"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      MIGRATOR_DATABASE_URL: postgresql+asyncpg://rag:rag@localhost:5432/rag
      DATABASE_URL: postgresql+asyncpg://rag_app:rag_app@localhost:5432/rag
      REDIS_URL: redis://localhost:6379/0
      ADMIN_BOOTSTRAP_KEY: ci-admin-key
      LLM_PROVIDER: anthropic
      EMBEDDING_PROVIDER: voyage
      ANTHROPIC_API_KEY: sk-ant-ci-placeholder
      VOYAGE_API_KEY: pa-ci-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev
      - name: Create restricted app role (mirrors docker/postgres/init.sh)
        run: |
          PGPASSWORD=rag psql -h localhost -U rag -d rag -c \
            "CREATE ROLE rag_app LOGIN PASSWORD 'rag_app' NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;"
          PGPASSWORD=rag psql -h localhost -U rag -d rag -c "GRANT USAGE ON SCHEMA public TO rag_app;"
      - run: uv run alembic upgrade head
      - name: Verify RLS fails closed without tenant context
        run: |
          ! PGPASSWORD=rag_app psql -h localhost -U rag_app -d rag -c \
            "INSERT INTO documents (id, tenant_id, source_identifier, filename, content_type, content_hash, chunking_config_version, raw_content) VALUES (gen_random_uuid(), gen_random_uuid(), 'x', 'x', 'text/plain', 'h', 'v1', 'x');"
      - run: uv run pytest tests/integration -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/api.Dockerfile -t enterprise-rag-api:ci .
      - run: docker build -f docker/worker.Dockerfile -t enterprise-rag-worker:ci .
